packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@types/node": ^24
  mock-config-server: ^4.0.3
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
  supportedArchitectures:
    cpu:
      - x64
    os:
      - win32
      - current
